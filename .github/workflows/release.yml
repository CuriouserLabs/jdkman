name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-22.04
    outputs:
      tag_name: ${{ steps.vars.outputs.tag_name }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify release originates from main
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.ref }}" != "refs/heads/main" ]; then
              echo "::error::workflow_dispatch must be run from the main branch (got ${{ github.ref }})."
              exit 1
            fi
          else
            git fetch origin main
            if ! git merge-base --is-ancestor "${{ github.sha }}" origin/main; then
              echo "::error::Tag ${{ github.ref_name }} does not point to a commit on main; aborting release."
              exit 1
            fi
          fi

      - name: Resolve release tag
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag_name=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

  publish-tauri:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
          - platform: windows-latest
          - platform: macos-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux desktop dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: java-manager-desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            ./java-manager-desktop/src-tauri -> target

      - name: Install desktop dependencies
        working-directory: java-manager-desktop
        run: npm ci

      - name: Prepare bundled CLI resource
        working-directory: java-manager-desktop
        run: npm run prepare:cli-resource

      - name: Build and publish Tauri bundles
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: java-manager-desktop
          tagName: ${{ needs.prepare-release.outputs.tag_name }}
          releaseCommitish: ${{ github.sha }}
          releaseName: "JDK Manager ${{ needs.prepare-release.outputs.tag_name }}"
          releaseBody: "Automated release for ${{ needs.prepare-release.outputs.tag_name }}"
          releaseDraft: false
          prerelease: false

  publish-cli:
    needs:
      - prepare-release
      - publish-tauri
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: jdkman-linux-x64
            binary_path: target/release/jdkman
            asset_name: jdkman-linux-x64
          - os: windows-latest
            artifact_name: jdkman-windows-x64
            binary_path: target/release/jdkman.exe
            asset_name: jdkman-windows-x64.exe
          - os: macos-latest
            artifact_name: jdkman-macos
            binary_path: target/release/jdkman
            asset_name: jdkman-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Build CLI
        run: cargo build -p java-manager-cli --release

      - name: Upload CLI asset to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload "${{ needs.prepare-release.outputs.tag_name }}" "${{ matrix.binary_path }}#${{ matrix.asset_name }}" --clobber
