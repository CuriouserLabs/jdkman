name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            java-manager-desktop/package-lock.json
            public-web/package-lock.json

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install desktop dependencies
        working-directory: java-manager-desktop
        run: npm ci

      - name: Prepare bundled CLI resource
        working-directory: java-manager-desktop
        run: npm run prepare:cli-resource

      - name: Run workspace tests
        run: cargo test

      - name: Build CLI release
        run: cargo build -p java-manager-cli --release

      - name: Build desktop frontend
        working-directory: java-manager-desktop
        run: npm run build

      - name: Build desktop Rust target
        run: cargo build -p java-manager-desktop
